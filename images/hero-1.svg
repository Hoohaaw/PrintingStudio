<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" fill="url(#g1)"/>
  <!-- grid lines -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="160" y1="0" x2="160" y2="560"/>
    <line x1="320" y1="0" x2="320" y2="560"/>
    <line x1="480" y1="0" x2="480" y2="560"/>
    <line x1="640" y1="0" x2="640" y2="560"/>
    <line x1="800" y1="0" x2="800" y2="560"/>
    <line x1="960" y1="0" x2="960" y2="560"/>
    <line x1="1120" y1="0" x2="1120" y2="560"/>
  </g>
  <!-- 3D printer silhouette (right side) -->
  <g transform="translate(720,80)" opacity="0.18" fill="white">
    <rect x="60" y="20" width="300" height="16" rx="8"/>
    <rect x="195" y="36" width="30" height="200" rx="4"/>
    <rect x="60" y="180" width="300" height="200" rx="12"/>
    <rect x="100" y="220" width="220" height="120" rx="8" fill="rgba(255,255,255,0.5)"/>
    <rect x="130" y="250" width="160" height="10" rx="5" fill="#2563eb"/>
  </g>
  <!-- geometric accent shapes -->
  <polygon points="900,100 960,200 840,200" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1050" cy="420" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1050" cy="420" r="80" fill="rgba(255,255,255,0.04)"/>
</svg>
